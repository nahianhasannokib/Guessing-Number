<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Mind Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Animated background particles -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container" id="mainContainer">

    <!-- Screen 1: Intro -->
    <div class="screen active" id="introScreen">
      <div class="brain-icon">🧠</div>
      <h1>Mind<br><span>Reader</span></h1>
      <p class="subtitle">I can read your mind.<br>Think of a number between <strong>1 – 100</strong> and I'll find it.</p>
      <div class="progress-hint">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <button class="btn btn-primary" onclick="startGame()">
        <span>Challenge Me</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- Screen 2: Question -->
    <div class="screen" id="questionScreen">
      <div class="question-header">
        <div class="step-counter">
          <span id="stepNum">1</span>
          <div class="step-label">question</div>
        </div>
        <div class="range-display">
          <span id="rangeDisplay">1 – 100</span>
          <div class="range-bar"><div class="range-fill" id="rangeFill"></div></div>
        </div>
      </div>

      <div class="question-card" id="questionCard">
        <div class="think-icon">🤔</div>
        <p id="question">Is your number greater than 50?</p>
      </div>

      <div class="answer-buttons">
        <button class="btn btn-yes" onclick="answerYes()">
          <span class="btn-icon">✓</span>
          <span>Yes</span>
        </button>
        <button class="btn btn-no" onclick="answerNo()">
          <span class="btn-icon">✗</span>
          <span>No</span>
        </button>
      </div>
    </div>

    <!-- Screen 3: Result -->
    <div class="screen" id="resultScreen">
      <div class="result-burst" id="resultBurst"></div>
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <h2 id="resultTitle">Got it!</h2>
      <div class="number-reveal" id="numberReveal">
        <span class="your-number-label">Your number was</span>
        <span class="your-number" id="yourNumber">42</span>
      </div>
      <p class="result-sub" id="resultSub">It only took me <strong id="stepCount">7</strong> questions!</p>
      <button class="btn btn-primary" onclick="resetGame()">
        <span>Try Again</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
